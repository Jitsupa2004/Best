<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      background: #111827;
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    header div {
      font-weight: bold;
      color: #60a5fa;
    }

    nav a {
      color: #e5e7eb;
      margin-left: 15px;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      transition: 0.3s;
    }

    nav a:hover {
      background: #1e293b;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 3px solid #60a5fa;
    }

    h1 {
      margin: 10px 0;
      color: #60a5fa;
    }

    .link {
      display: block;
      padding: 12px;
      margin: 10px 0;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      text-decoration: none;
      color: #93c5fd;
      transition: 0.3s;
    }

    .link:hover {
      background: #1e293b;
      transform: translateX(5px);
    }
  </style>
</head>

<body>

<header>
  <div>IT Portfolio</div>
  <nav>
    <a href="/">Home</a>
    <a href="/database">Database</a>
    <a href="/network">Network</a>
    <a href="/programming">Programming</a>
  </nav>
</header>

<main>
  {{ content }}
</main>

</body>
</html>
